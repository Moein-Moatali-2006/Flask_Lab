{% extends "base.html" %}

{% block content %}
    <h3>Hello {{ current_user.username }}..!</h3>

    <div class="card">
        {% for post in posts %}
            <a href="{{ url_for('posts.detail', post_id=post.id) }}" class="card-body"> {{ post.title }} </a>
        {% endfor %}
    </div>

{% endblock %}
